<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Research Survey - Shamal</title>
  <script defer src="/_vercel/insights/script.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Poppins', sans-serif;
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
      padding: 1rem;
    }

    /* Animated gradient background */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(125deg, #0f0f1a 0%, #1a1a2e 25%, #16213e 50%, #0f0f1a 100%);
      z-index: -3;
    }

    /* Animated orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -2;
      animation: orbFloat 20s ease-in-out infinite;
    }

    .orb-1 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, transparent 70%);
      top: -200px;
      right: -200px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, transparent 70%);
      bottom: -150px;
      left: -150px;
      animation-delay: -7s;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(236, 72, 153, 0.2) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(30px, -30px) scale(1.05); }
      50% { transform: translate(-20px, 20px) scale(0.95); }
      75% { transform: translate(20px, 10px) scale(1.02); }
    }

    /* Particle stars */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s infinite ease-in-out;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }

    .container {
      text-align: center;
      width: min(100%, 560px);
      padding: 2rem;
      animation: fadeInUp 1s ease-out;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      padding: 3.5rem 3rem;
      width: 100%;
      max-width: 480px;
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
      animation: shimmer 3s infinite;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .avatar {
      width: 100px;
      height: 100px;
      margin: 0 auto 1.5rem;
      background: linear-gradient(135deg, #8b5cf6 0%, #ec4899 50%, #3b82f6 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      animation: avatarPulse 3s infinite;
    }

    .avatar::before {
      content: '';
      position: absolute;
      inset: -4px;
      background: linear-gradient(135deg, #8b5cf6, #ec4899, #3b82f6, #8b5cf6);
      border-radius: 50%;
      z-index: -1;
      animation: rotate 4s linear infinite;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes avatarPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(139, 92, 246, 0.4); }
      50% { box-shadow: 0 0 0 20px rgba(139, 92, 246, 0); }
    }

    .avatar-emoji {
      font-size: 3rem;
      animation: wave 2s infinite;
      display: inline-block;
    }

    @keyframes wave {
      0%, 100% { transform: rotate(0deg); }
      10% { transform: rotate(14deg); }
      20% { transform: rotate(-8deg); }
      30% { transform: rotate(14deg); }
      40% { transform: rotate(-4deg); }
      50% { transform: rotate(10deg); }
      60%, 100% { transform: rotate(0deg); }
    }

    .greeting {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.5);
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 0.5rem;
      animation: fadeIn 1s ease-out 0.3s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    h1 {
      color: #ffffff;
      font-size: clamp(1.8rem, 4vw, 2.25rem);
      margin-bottom: 0.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 1s ease-out 0.4s both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.2) 0%, rgba(59, 130, 246, 0.2) 100%);
      border: 1px solid rgba(139, 92, 246, 0.3);
      padding: 0.5rem 1.25rem;
      border-radius: 50px;
      margin: 1rem 0 1.5rem;
      animation: fadeIn 1s ease-out 0.5s both;
    }

    .badge-icon {
      font-size: 1rem;
    }

    .badge-text {
      color: #a78bfa;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .description {
      color: rgba(255, 255, 255, 0.7);
      font-size: 1rem;
      line-height: 1.8;
      margin-bottom: 2rem;
      animation: fadeIn 1s ease-out 0.6s both;
    }

    .description strong {
      color: #ffffff;
      font-weight: 600;
    }

    .highlight {
      background: linear-gradient(135deg, rgba(139, 92, 246, 0.15) 0%, rgba(236, 72, 153, 0.15) 100%);
      padding: 1rem 1.5rem;
      border-radius: 16px;
      border-left: 3px solid #8b5cf6;
      margin-bottom: 2rem;
      animation: fadeIn 1s ease-out 0.7s both;
    }

    .highlight-text {
      color: rgba(255, 255, 255, 0.9);
      font-size: 0.95rem;
      font-style: italic;
    }

    .loader-section {
      animation: fadeIn 1s ease-out 0.8s both;
    }

    .loader {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .loader span {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      animation: loaderBounce 1.4s infinite ease-in-out both;
    }

    .loader span:nth-child(1) {
      background: #8b5cf6;
      animation-delay: -0.32s;
    }
    .loader span:nth-child(2) {
      background: #ec4899;
      animation-delay: -0.16s;
    }
    .loader span:nth-child(3) {
      background: #3b82f6;
      animation-delay: 0s;
    }

    @keyframes loaderBounce {
      0%, 80%, 100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }

    .status {
      color: rgba(255, 255, 255, 0.5);
      font-size: 0.875rem;
      margin-bottom: 0.5rem;
    }

    .countdown {
      color: #8b5cf6;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .progress-container {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      padding: 4px;
      margin-top: 1rem;
    }

    .progress-bar {
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #ec4899, #3b82f6);
      background-size: 200% 100%;
      border-radius: 8px;
      animation: loading 3s ease-in-out forwards, gradientMove 2s ease infinite;
    }

    @keyframes loading {
      0% { width: 0%; }
      100% { width: 100%; }
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .footer-text {
      margin-top: 1.5rem;
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
      animation: fadeIn 1s ease-out 1s both;
    }

    .footer-text a {
      color: #8b5cf6;
      text-decoration: none;
    }

    /* Floating icons */
    .floating-icons {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .floating-icon {
      position: absolute;
      font-size: 1.5rem;
      opacity: 0.15;
      animation: floatIcon 20s infinite linear;
    }

    @keyframes floatIcon {
      0% {
        transform: translateY(100vh) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.15;
      }
      90% {
        opacity: 0.15;
      }
      100% {
        transform: translateY(-100vh) rotate(720deg);
        opacity: 0;
      }
    }

    @media (max-width: 768px) {
      body {
        align-items: flex-start;
        padding: 1.25rem 0.9rem;
      }

      .container {
        padding: 0;
      }

      .card {
        border-radius: 24px;
        padding: 2.4rem 1.6rem;
      }

      .avatar {
        width: 84px;
        height: 84px;
        margin-bottom: 1.1rem;
      }

      .avatar-emoji {
        font-size: 2.4rem;
      }

      .greeting {
        font-size: 0.8rem;
        letter-spacing: 2.2px;
      }

      .description {
        font-size: 0.95rem;
        line-height: 1.65;
        margin-bottom: 1.5rem;
      }

      .highlight {
        padding: 0.85rem 1rem;
        margin-bottom: 1.5rem;
      }

      .orb {
        filter: blur(65px);
      }

      .orb-1,
      .orb-2 {
        width: 380px;
        height: 380px;
      }

      .orb-3 {
        width: 280px;
        height: 280px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 1rem 0.7rem;
      }

      .card {
        border-radius: 20px;
        padding: 2rem 1.1rem;
      }

      h1 {
        font-size: 1.65rem;
      }

      .badge {
        padding: 0.42rem 0.8rem;
        margin: 0.9rem 0 1.2rem;
      }

      .badge-text,
      .highlight-text,
      .status,
      .description {
        font-size: 0.86rem;
      }

      .countdown {
        font-size: 1.3rem;
      }

      .floating-icon {
        font-size: 1.15rem;
      }

      .footer-text {
        font-size: 0.7rem;
      }
    }

    @media (max-height: 740px) {
      body {
        align-items: flex-start;
      }

      .container {
        padding-top: 0.75rem;
        padding-bottom: 0.75rem;
      }

      .card {
        padding-top: 2rem;
        padding-bottom: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="bg-gradient"></div>
  
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="particles" id="particles"></div>

  <div class="floating-icons">
    <span class="floating-icon" style="left: 10%; animation-delay: 0s;">🔒</span>
    <span class="floating-icon" style="left: 25%; animation-delay: -3s;">🛡️</span>
    <span class="floating-icon" style="left: 40%; animation-delay: -6s;">💻</span>
    <span class="floating-icon" style="left: 55%; animation-delay: -9s;">🤖</span>
    <span class="floating-icon" style="left: 70%; animation-delay: -12s;">🔐</span>
    <span class="floating-icon" style="left: 85%; animation-delay: -15s;">📊</span>
  </div>

  <div class="container">
    <div class="card">
      <div class="avatar">
        <span class="avatar-emoji">👋</span>
      </div>
      
      <p class="greeting">Welcome</p>
      <h1>Hi, I'm Shamal!</h1>
      
      <div class="badge">
        <span class="badge-icon">🎓</span>
        <span class="badge-text">Final Year BIT Student</span>
      </div>
      
      <p class="description">
        Thank you for taking time to participate in my research study!
      </p>
      
      <div class="highlight">
        <p class="highlight-text">
          "Using AI to Detect Unsafe Cybersecurity Behaviors in Remote Work"
        </p>
      </div>

      <div class="loader-section">
        <div class="loader">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <p class="status">Preparing your survey</p>
        <p class="countdown" id="countdown">3</p>
        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress"></div>
          </div>
        </div>
      </div>

      <p class="footer-text">
        100% Anonymous • Academic Purpose Only<br>
        <a href="https://shamal.vercel.app">shamal.vercel.app</a>
      </p>
    </div>
  </div>

  <script>
    // Create particle stars
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 50; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.top = Math.random() * 100 + '%';
      particle.style.animationDelay = Math.random() * 3 + 's';
      particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
      particlesContainer.appendChild(particle);
    }

    // Countdown timer
    let count = 3;
    const countdownEl = document.getElementById('countdown');
    
    const timer = setInterval(() => {
      count--;
      if (count > 0) {
        countdownEl.textContent = count;
      } else {
        countdownEl.textContent = '🚀';
        clearInterval(timer);
      }
    }, 1000);

    // Redirect after 3 seconds
    setTimeout(() => {
      window.location.href = 'https://forms.gle/JLHMWAfkPkTc9qx17';
    }, 3000);
  </script>
</body>
</html>
